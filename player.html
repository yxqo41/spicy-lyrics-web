<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spicy AMLL Player — Player</title>
  <meta name="description" content="Spicy AMLL Player — Synchronized lyrics with beautiful animations.">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dynamic-bg.css">
  <link rel="stylesheet" href="css/player.css">
  <link rel="stylesheet" href="css/lyrics.css">

  <!-- Favicon & Icons -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon.png">


</head>

<body>
  <div id="SpicyLyricsPage">
    <!-- Dynamic Background -->
    <div class="spicy-dynamic-bg" id="dynamic-bg"></div>

    <!-- Back Button -->
    <button class="back-button" id="back-button" title="Back to upload">
      <img src="icons/back.png" alt="Back">
    </button>

    <!-- Content Box -->
    <div class="ContentBox">
      <!-- NowBar (Album Art + Metadata + Controls) — Apple Music Style -->
      <div class="NowBar Active LeftSide" id="now-bar">
        <div class="Grabber"></div>
        <div class="Header">

          <div class="MediaBox" id="media-box">
            <div class="MediaImageContainer" id="album-art"></div>
          </div>

          <div class="MetadataRow">
            <div class="Metadata" id="metadata">
              <div class="SongName" id="song-name"><span>Loading...</span></div>
              <div class="Artists" id="artists">—</div>
            </div>
            <div class="MetadataActions">
              <button class="favorite-button" id="btn-favorite" title="Favorite">
                <img src="icons/favorite.png" alt="Favorite" id="favorite-icon" width="32" height="32">
              </button>
              <button class="options-button" id="btn-options">
                <img src="icons/settings.png" id="setting-icon" alt="Settings" width="32" height="32">
              </button>
            </div>
          </div>

          <!-- Integrated Progress Bar -->
          <div class="NowBarProgress">
            <div class="progress-bar-wrapper" id="progress-bar">
              <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="progress-times">
              <span class="progress-time" id="time-current">0:00</span>
              <span class="progress-time" id="time-total">-0:00</span>
            </div>
          </div>

          <!-- Quality Badge -->
          <div class="quality-badge-container">
            <div class="quality-badge" id="quality-badge">
              <img src="icons/lossless.png" alt="Lossless" id="quality-badge-icon" style="width: 17px; height: 14px; margin-right: 4px;">
              <span id="quality-badge-text">Lossless</span>
            </div>
          </div>

          <!-- Integrated Playback Controls -->
          <div class="NowBarControls">
            <div class="playback-control shuffle" id="btn-shuffle" title="Shuffle">
              <img src="icons/button_icon_shuffle.png" alt="Shuffle" id="shuffle-icon">
            </div>
            <div class="playback-control skip-back" id="btn-backward" title="Previous">
              <img src="icons/rewind.png" alt="Previous">
            </div>
            <div class="playback-control play-pause" id="btn-play-pause" title="Play/Pause">
              <img src="icons/paused.png" alt="Play" id="play-pause-icon">
            </div>
            <div class="playback-control skip-forward" id="skip-forward" title="Next">
              <img src="icons/forward.png" alt="Next">
            </div>
            <div class="playback-control repeat" id="btn-repeat" title="Repeat">
              <img src="icons/repeat.svg" alt="Repeat" id="repeat-icon">
            </div>
          </div>

          <!-- Volume Area -->
          <div class="VolumeArea">
            <img src="icons/volume_low.png" class="volume-side-icon" alt="Volume Low">
            <div class="volume-slider-wrapper">
              <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </div>
            <img src="icons/volume_full.png" class="volume-side-icon" alt="Volume High">
          </div>


        </div>
      </div>

      <!-- Lyrics Area -->
      <div class="LyricsContainer" id="lyrics-container">
        <div class="LyricsContent" id="lyrics-content">
          <div class="LyricsNotice" id="lyrics-notice">
            <div class="SlBounceLoader"></div>
            <span class="notice-descriptor">Loading lyrics...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Queue Panel (Apple Music Style) -->
    <div class="QueuePanel" id="queue-panel">
      <div class="QueueHeader">
        <h3>Up Next</h3>
        <div class="QueueActions">
          <button id="queue-clear">Clear</button>
          <button id="queue-close">✕</button>
        </div>
      </div>
      <div class="QueueList" id="player-queue-list">
        <!-- Queue items -->
      </div>
    </div>

    <!-- Translation Toggle -->
    <button class="translation-toggle" id="btn-translation" style="display: none;">
      <span style="font-size: 13px;">文/A</span>
      <span class="text">Translation: Off</span>
    </button>
    <!-- Romanization Toggle -->
    <button class="romanization-toggle" id="btn-romanization" style="display: none;">
      <span style="font-size: 13px;">A/あ</span>
      <span class="text">Romanized: Off</span>
    </button>
    <!-- Lyrics Source Badge -->
    <div class="lyrics-source-badge" id="lyrics-source-badge"></div>
  </div>

  <script type="module">
    import { 
      hasPlayerData, getQueue, getTrackData, getCurrentIndex, setCurrentIndex, 
      addTrackToQueue, updateQueueOrder, getTTMLContent, getAudioBlobUrl, getAudioName, isAutoFetchMode, goToUpload,
      updateTrackAmTrackId
    } from './js/router.js';
    import parseTTMLToLyrics, { parseSongwriterString } from './js/ttml-parser.js';
    import { applySyllableLyrics, applyLineLyrics, applyStaticLyrics, LyricsObject, convertToSyllable } from './js/lyrics-applyer.js';
    import { setLyricsTime } from './js/lyrics-setter.js';
    import { animateLyrics } from './js/lyrics-animator.js';
    import { initScrollManager, scrollToActiveLine, resetScrollManager, queueForceScroll, isUserScrolling } from './js/scroll-manager.js';

    import AudioPlayer from './js/audio-player.js';
    import { applyDefaultBackground, applyLegacyBackground, extractColors } from './js/dynamic-bg.js';
    import { parseAudioMetadata } from './js/metadata-parser.js';
    import { retrieveTTML } from './js/ttml-retriever.js';
    import { GeniusService } from './js/genius-service.js';
    import { settingsManager } from './js/settings-manager.js';
    import { settingsUI } from './js/settings-ui.js';
    import { getAnimatedArtwork, applyAnimatedArt } from './js/animated-art.js';
    import VideoExporter from './js/video-exporter.js';
    import { MediaSessionManager } from './js/media-session.js';
    import { escapeHTML } from './js/security-utils.js';


    import isRtl from './js/is-rtl.js';

    // ── Elements ──
    const lyricsContent = document.getElementById('lyrics-content');
    const lyricsNotice = document.getElementById('lyrics-notice');
    const songNameEl = document.getElementById('song-name');
    const artistsEl = document.getElementById('artists');
    const albumArt = document.getElementById('album-art');
    const dynamicBg = document.getElementById('dynamic-bg');

    const btnPlayPause = document.getElementById('btn-play-pause');
    const playPauseIcon = document.getElementById('play-pause-icon');
    const btnBackward = document.getElementById('btn-backward');
    const btnForward = document.getElementById('skip-forward');
    const btnShuffle = document.getElementById('btn-shuffle');
    const btnRepeat = document.getElementById('btn-repeat');
    const btnOptions = document.getElementById('btn-options');
    const btnQueue = document.getElementById('btn-queue');
    const shuffleIcon = document.getElementById('shuffle-icon');
    const repeatIcon = document.getElementById('repeat-icon');

    const queuePanel = document.getElementById('queue-panel');
    const playerQueueList = document.getElementById('player-queue-list');
    const queueClose = document.getElementById('queue-close');
    const queueClear = document.getElementById('queue-clear');

    const backButton = document.getElementById('back-button');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const volumeSlider = document.getElementById('volume-slider');
    const sourceBadge = document.getElementById('lyrics-source-badge');
    const btnRomanization = document.getElementById('btn-romanization');
    const btnTranslation = document.getElementById('btn-translation');

    // ── State ──
    settingsManager.apply();
    const player = new AudioPlayer();
    window.spicyPlayer = player;

    const mediaSessionManager = new MediaSessionManager(
      player,
      () => { if (btnForward.onclick) btnForward.onclick(); },
      () => { if (btnBackward.onclick) btnBackward.onclick(); }
    );
    let lyricsType = 'None';
    let parsedLyrics = null;
    let animationFrameId = null;
    let songMetadata = { title: '', artist: '', album: '', artUrl: null };
    let currentQueue = [];
    let previousLyricsSourceOrder = JSON.stringify(settingsManager.get("lyricsSourceOrder"));
    
    const videoExporter = new VideoExporter(player);
    window.addEventListener('spicy-export-video', () => {
      videoExporter.startExport(songMetadata);
    });

    // ── Init ──
    async function init() {
      if (!(await hasPlayerData())) {
        window.location.href = 'index.html';
        return;
      }
      
      showGlobalLoader();
      await refreshQueue();
      await loadTrack(getCurrentIndex());
    }

    function showGlobalLoader() {
      const globalLoader = document.createElement('div');
      globalLoader.className = 'SpicyLoader active';
      globalLoader.innerHTML = '<div class="SlBounceLoader"></div>';
      document.body.appendChild(globalLoader);
      setTimeout(() => {
        globalLoader.classList.remove('active');
        setTimeout(() => globalLoader.remove(), 400);
      }, 1500);
    }

    async function refreshQueue() {
      currentQueue = await getQueue();
      renderQueue();
    }

    function renderQueue() {
      playerQueueList.innerHTML = '';
      const currentIndex = getCurrentIndex();
      const currentTrackId = currentQueue[currentIndex]?.id;

      currentQueue.forEach((track, index) => {
        const item = document.createElement('div');
        item.className = `player-queue-item ${index === currentIndex ? 'active' : ''}`;
        item.draggable = true;
        item.dataset.id = track.id;
        item.dataset.index = index;

        const safeName = escapeHTML(track.name.replace(/\.[^.]+$/, ''));
        const safeArtist = escapeHTML(track.artist || 'Unknown Artist');

        item.innerHTML = `
          <div class="drag-handle" style="margin-right: 12px; opacity: 0.3;">≡</div>
          <div class="pq-art" style="background-image: url('${track.artUrl || 'favicon.svg'}');"></div>
          <div class="pq-info">
            <span class="pq-name">${safeName}</span>
            <span class="pq-artist">${safeArtist}</span>
          </div>
        `;

        item.onclick = (e) => {
          if (e.target.classList.contains('drag-handle')) return;
          loadTrack(index);
        };

        // Drag Events
        item.addEventListener('dragstart', () => item.classList.add('dragging'));
        item.addEventListener('dragend', () => item.classList.remove('dragging'));

        playerQueueList.appendChild(item);
      });

      // Reordering logic
      playerQueueList.onsyncorder = async () => {
        const newIds = Array.from(playerQueueList.querySelectorAll('.player-queue-item')).map(el => parseInt(el.dataset.id));
        await updateQueueOrder(newIds);
        currentQueue = await getQueue();
        
        // Restore correct currentIndex for the playing track
        const newIdx = currentQueue.findIndex(t => t.id === currentTrackId);
        if (newIdx !== -1) setCurrentIndex(newIdx);
        
        renderQueue();
      };
    }

    playerQueueList.addEventListener('dragover', (e) => {
      e.preventDefault();
      const draggingEl = playerQueueList.querySelector('.dragging');
      const afterElement = getDragAfterElement(playerQueueList, e.clientY);
      if (afterElement == null) {
        playerQueueList.appendChild(draggingEl);
      } else {
        playerQueueList.insertBefore(draggingEl, afterElement);
      }
    });

    playerQueueList.addEventListener('drop', (e) => {
      e.preventDefault();
      if (playerQueueList.onsyncorder) playerQueueList.onsyncorder();
    });

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.player-queue-item:not(.dragging)')];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    async function loadTrack(index) {
      if (index < 0 || index >= currentQueue.length) return;
      
      const contentBox = document.querySelector('.ContentBox');
      if (contentBox) contentBox.style.opacity = '0';
      
      // Short delay for fade out
      await new Promise(r => setTimeout(r, 340));

      setCurrentIndex(index);
      const track = await getTrackData(currentQueue[index].id);
      if (!track) {
        if (contentBox) contentBox.style.opacity = '1';
        return;
      }

      // Reset UI
      parsedLyrics = null;
      lyricsContent.innerHTML = '';
      lyricsType = 'None';
      if (sourceBadge) sourceBadge.textContent = '';
      showNotice('⏳ Loading track...');
      
      albumArt.innerHTML = '';
      albumArt.className = 'MediaImageContainer'; 
      albumArt.style.backgroundImage = 'none'; 
      
      dynamicBg.innerHTML = '';
      dynamicBg.className = 'spicy-dynamic-bg';
      
      const blob = new Blob([track.buffer], { type: track.type });
      const url = URL.createObjectURL(blob);
      
      const processMetadata = async (duration) => {
          timeTotal.textContent = AudioPlayer.formatTime(duration, true);
          songMetadata = await parseAudioMetadata(track.buffer, track.name);
          updateMetadataUI(songMetadata);

          if (!songMetadata.title) {
            songNameEl.querySelector('span').textContent = track.name.replace(/\.[^.]+$/, '');
          }

          if (track.ttml && track.ttml !== '__AUTO_FETCH__') {
            try {
              parsedLyrics = parseTTMLToLyrics(track.ttml);
              applyLyricsToUI(parsedLyrics);
              if (sourceBadge) sourceBadge.textContent = "LYRICS: TTML";
            } catch (e) {
              console.error("Lyrics parse failed", e);
              showNotice("Failed to parse local lyrics");
            }
          } else {
            autoFetchLyrics(songMetadata, track.amTrackId);
          }

          if (settingsManager.get('showSongwriters')) {
            const existingWriters = parsedLyrics?.SongWriters || [];
            GeniusService.fetchCredits(songMetadata, existingWriters).then(writers => {
              if (writers && writers.length > existingWriters.length) {
                if (parsedLyrics) {
                  parsedLyrics.SongWriters = writers;
                  const creditsEl = lyricsContent.querySelector('.Credits');
                  if (creditsEl) {
                    creditsEl.textContent = `Written by: ${writers.join(', ')}`;
                  } else {
                    const scrollContainer = lyricsContent.querySelector('.SpicyLyricsScrollContainer');
                    if (scrollContainer) {
                      const newCredits = document.createElement('div');
                      newCredits.className = 'Credits';
                      newCredits.textContent = `Written by: ${writers.join(', ')}`;
                      const spacer = scrollContainer.querySelector('.lyrics-spacer');
                      if (spacer) scrollContainer.insertBefore(newCredits, spacer);
                      else scrollContainer.appendChild(newCredits);
                    }
                  }
                }
              }
            });
          }

          refreshQueue();
          queueForceScroll();
          
          if (contentBox) contentBox.style.opacity = '1';
      };

      return new Promise((resolve) => {
        player.onLoadedMetadata = async (duration) => {
          await processMetadata(duration);
          resolve();
        };
        player.setSource(url);
      });
    }

    function updateMetadataUI(metadata) {
      if (metadata.title) {
        songNameEl.querySelector('span').textContent = metadata.title;
        document.title = `Spicy AMLL Player — ${metadata.title}`;
        
        if (isRtl(metadata.title)) songNameEl.classList.add('rtl');
        else songNameEl.classList.remove('rtl');
      }
      if (metadata.artist) {
        const yearStr = (metadata.year && settingsManager.get("releaseYearPosition") !== "Off") ? metadata.year : "";
        const yearPos = settingsManager.get("releaseYearPosition");
        const artistText = yearStr ? (yearPos === "Before Artist" ? `${yearStr} • ${metadata.artist}` : `${metadata.artist} • ${yearStr}`) : metadata.artist;
        artistsEl.textContent = artistText;

        if (isRtl(metadata.artist)) artistsEl.classList.add('rtl');
        else artistsEl.classList.remove('rtl');
      }
      
      if (metadata.artUrl) {
        albumArt.style.backgroundImage = `url(${metadata.artUrl})`;
        extractColors(metadata.artUrl).then(colors => {
          dynamicBg.innerHTML = '';
          dynamicBg.className = 'spicy-dynamic-bg';
          applyLegacyBackground(dynamicBg, metadata.artUrl);
          if (colors.vibrant) document.documentElement.style.setProperty('--ArtworkGlowColor', colors.vibrant.join(', '));
        }).catch(e => console.warn('Color extraction failed:', e));
      } else {
        applyDefaultBackground(dynamicBg);
        albumArt.style.backgroundImage = 'none';
      }

      if (metadata.artist) {
        fetchAnimatedArt(metadata.artist, metadata.album, metadata.title);
      }

      mediaSessionManager.updateMetadata(metadata.title, metadata.artist, metadata.album, metadata.artUrl);
    }

    async function autoFetchLyrics(metadata, amTrackId = null) {
      showNotice('🔍 Searching for lyrics...');
      try {
        const durationSec = player.duration / 1000 || 0;
        const result = await retrieveTTML(metadata.title, metadata.artist, metadata.album, durationSec, amTrackId);
        if (result && result.lyricsData) {
          // Attach maker metadata for the credits renderer
          result.lyricsData.makerHandle = result.makerHandle;
          result.lyricsData.makerId = result.makerId;
          
          parsedLyrics = cleanLyricsData(result.lyricsData);
          applyLyricsToUI(parsedLyrics);
          if (sourceBadge) {
             sourceBadge.textContent = `Lyrics: ${result.sourceDisplayName || 'Auto-fetched'}`;
          }

          // Save song ID to IndexedDB if it was found and not already saved
          if (result.songId && !amTrackId) {
            const currentTrack = currentQueue[getCurrentIndex()];
            if (currentTrack) {
              console.log(`[Player] Saving found song ID ${result.songId} to IndexedDB`);
              updateTrackAmTrackId(currentTrack.id, result.songId);
              currentTrack.amTrackId = result.songId; // Update in memory too
            }
          }
        } else {
          showNotice('No lyrics found');
        }
      } catch (err) {
        console.error("Auto-fetch error:", err);
        showNotice('Could not fetch lyrics');
      }
    }

    /**
     * Cleans and filters lyrics data (filters composer info, handles 'Written by').
     */
    function cleanLyricsData(data) {
      if (!data || (!data.Content && !data.Lines)) return data;
      
      const isStatic = data.Type === 'Static';
      const lines = isStatic ? data.Lines : data.Content;
      const filteredLines = [];
      const writers = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const isSyllable = data.Type === 'Syllable';
        let text = line.Text || "";
        if (isSyllable && line.Lead && line.Lead.Syllables) {
           text = line.Lead.Syllables.map(s => s.Text).join("");
        }
        text = text || "";
        
        // 1. Delete lines containing technical metadata or empty lines
        if (!text.trim() ||
            text.includes("作曲") || text.includes("作词") || 
            text.includes("编曲") || text.includes("制作人") ||
            text.includes("©") ||
            text.toLowerCase().includes("produced by")) continue;

        // 2. Handle "Written by"
        const writtenByMatch = text.match(/Written\s+by[:\s]+(.*)/i);
        if (writtenByMatch) {
          const names = writtenByMatch[1].trim();
          writers.push(...parseSongwriterString(names));
          // Truncate here (don't show "Written by" as a line, and stop processing further lines)
          break;
        }
        
        filteredLines.push(line);
      }

      if (isStatic) data.Lines = filteredLines;
      else data.Content = filteredLines;

      if (writers.length > 0) {
        data.SongWriters = (data.SongWriters || []).concat(writers);
      }

      return data;
    }

    function applyLyricsToUI(lyrics) {
      if (!lyrics) return;

      // Check if Romanization is available
      let hasRomanization = false;
      let hasTranslation = false;
      if (lyrics.Content) {
        hasRomanization = lyrics.Content.some(line => {
          if (line.RomanizedText) return true;
          if (line.Lead && line.Lead.Syllables) {
            return line.Lead.Syllables.some(s => s.RomanizedText);
          }
          return false;
        });
        hasTranslation = lyrics.Content.some(line => line.TranslatedText !== undefined);
      } else if (lyrics.Lines) {
        hasRomanization = lyrics.Lines.some(l => l.RomanizedText);
        hasTranslation = lyrics.Lines.some(l => l.TranslatedText !== undefined);
      }

      const isRomanized = settingsManager.get("showRomanized");
      const isTranslated = settingsManager.get("showTranslation");

      if (btnRomanization) {
        if (hasRomanization) {
          btnRomanization.style.display = 'flex';
          updateRomanizationBtnState(isRomanized);
        } else {
          btnRomanization.style.display = 'none';
        }
      }

      if (btnTranslation) {
        if (hasTranslation) {
          btnTranslation.style.display = 'flex';
          updateTranslationBtnState(isTranslated);
        } else {
          btnTranslation.style.display = 'none';
        }
      }
      
      let typeToRender = lyrics.Type;
      // Handle Force Word Sync redirection
      if (typeToRender === 'Line' && settingsManager.get("forceWordSync")) {
        typeToRender = 'Syllable';
      }
      
      lyricsType = typeToRender;
      if (lyricsNotice) lyricsNotice.style.display = 'none';
      
      if (typeToRender === 'Syllable') {
        const data = (lyrics.Type === 'Line' && settingsManager.get("forceWordSync")) 
          ? convertToSyllable(lyrics) 
          : lyrics;
        applySyllableLyrics(data, lyricsContent);
      }
      else if (typeToRender === 'Line') applyLineLyrics(lyrics, lyricsContent);
      else if (typeToRender === 'Static') applyStaticLyrics(lyrics, lyricsContent);

      initScrollManager(lyricsContent);
    }

    function showNotice(text) {
      if (lyricsNotice) {
        lyricsNotice.style.display = '';
        lyricsNotice.querySelector('.notice-descriptor').textContent = text;
      }
    }

    async function fetchAnimatedArt(artist, album, title) {
      // Check if animated cover art is enabled in settings
      if (!settingsManager.get('coverArtAnimation')) {
        // Remove any existing animated art if the setting was just toggled off
        const existingVideo = albumArt?.querySelector('.animated-art-video');
        if (existingVideo) existingVideo.remove();
        return;
      }

      try {
        const videoUrl = await getAnimatedArtwork(artist, album, title);
        if (videoUrl) {
          applyAnimatedArt(albumArt, videoUrl);
        }
      } catch (e) {
        console.error('[AnimatedArt] Integration error:', e);
      }
    }

    // Listen for settings changes to remove animated art in real-time when toggled off
    window.addEventListener('spicy-settings-changed', (e) => {
      if (!e.detail.coverArtAnimation) {
        const existingVideo = albumArt?.querySelector('.animated-art-video');
        if (existingVideo) existingVideo.remove();
        // Also remove background video
        const bgVideo = dynamicBg?.querySelector('video');
        if (bgVideo) {
          bgVideo.remove();
          dynamicBg.className = 'spicy-dynamic-bg';
        }
      }

      // Check if provider order changed and refetch lyrics if needed
      const currentOrder = JSON.stringify(e.detail.lyricsSourceOrder);
      if (currentOrder !== previousLyricsSourceOrder) {
        previousLyricsSourceOrder = currentOrder;
        
        if (songMetadata && songMetadata.title) {
          console.log('[Player] Lyrics source order changed, refetching...');
          const currentTrack = currentQueue[getCurrentIndex()];
          autoFetchLyrics(songMetadata, currentTrack?.amTrackId);
        }
      }
    });



    // ── Events ──
    player.onLoadedMetadata = (duration) => {
      timeTotal.textContent = AudioPlayer.formatTime(duration, true);
    };

    player.onEnded = () => {
      const nextIdx = getCurrentIndex() + 1;
      if (nextIdx < currentQueue.length) {
        loadTrack(nextIdx);
        player.play();
      } else if (player.repeatMode === 1) { // Repeat All
        loadTrack(0);
        player.play();
      } else {
        updatePlayPauseIcon(false);
      }
    };

    btnPlayPause.onclick = () => {
      const playing = player.togglePlay();
      updatePlayPauseIcon(playing);
      if (playing && !animationFrameId) startAnimationLoop();
    };

    btnForward.onclick = () => {
      const next = getCurrentIndex() + 1;
      if (next < currentQueue.length) loadTrack(next);
    };

    btnBackward.onclick = () => {
      const pos = player.getPosition();
      if (pos > 3000) {
        player.seek(0);
      } else {
        const prev = getCurrentIndex() - 1;
        if (prev >= 0) loadTrack(prev);
      }
    };

    btnRepeat.onclick = () => {
      player.repeatMode = (player.repeatMode + 1) % 3;
      updateRepeatUI();
    };

    function updateRepeatUI() {
      if (player.repeatMode === 0) {
        repeatIcon.src = 'icons/repeat.svg';
        btnRepeat.classList.remove('active');
      } else if (player.repeatMode === 1) {
        repeatIcon.src = 'icons/being-repeat.svg';
        btnRepeat.classList.add('active');
      } else if (player.repeatMode === 2) {
        repeatIcon.src = 'icons/being-repeat1.svg';
        btnRepeat.classList.add('active');
      }
    }

    btnQueue.onclick = () => queuePanel.classList.toggle('active');
    queueClose.onclick = () => queuePanel.classList.remove('active');
    queueClear.onclick = async () => {
      if (confirm('Clear entire queue?')) {
        await goToUpload();
      }
    };

    // ── Dynamic Audio Adding (Drag & Drop) ──
    const dropOverlay = document.createElement('div');
    dropOverlay.className = 'drop-zone-overlay';
    dropOverlay.innerHTML = '<div class="drop-zone-content"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><h2>Drop to Add to Queue</h2></div>';
    document.body.appendChild(dropOverlay);

    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropOverlay.classList.add('active');
    });

    window.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null) dropOverlay.classList.remove('active');
    });

    window.addEventListener('drop', async (e) => {
      e.preventDefault();
      dropOverlay.classList.remove('active');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/'));
      
      if (files.length > 0) {
        for (const file of files) {
          const reader = new FileReader();
          const buffer = await new Promise(r => {
            reader.onload = (ev) => r(ev.target.result);
            reader.readAsArrayBuffer(file);
          });
          
          const metadata = await parseAudioMetadata(buffer, file.name);
          
          await addTrackToQueue(buffer, {
            name: metadata.title || file.name,
            artist: metadata.artist || 'Unknown Artist',
            artUrl: metadata.artUrl || null,
            type: file.type || 'audio/mpeg',
            ttml: '__AUTO_FETCH__'
          });
        }
        await refreshQueue();
      }
    });

    // ── Rest of the Player Utilities ──
    backButton.onclick = async () => { player.pause(); await goToUpload(); };
    
    function updateVolumeSliderFill(val) {
      volumeSlider.style.background = `linear-gradient(to right, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.8) ${val * 100}%, rgba(255, 255, 255, 0.15) ${val * 100}%, rgba(255, 255, 255, 0.15) 100%)`;
    }
    
    volumeSlider.oninput = (e) => {
      const val = parseFloat(e.target.value);
      player.setVolume(val);
      updateVolumeSliderFill(val);
    };

    // AirPlay Popup Logic
    const btnAirplay = document.getElementById('btn-airplay');
    const airplayPopup = document.getElementById('airplay-popup');
    const btnClosePopup = document.getElementById('btn-close-popup');

    if (btnAirplay) {
      btnAirplay.onclick = () => {
        airplayPopup.style.display = 'flex';
      };
    }
    if (btnClosePopup) {
      btnClosePopup.onclick = () => {
        airplayPopup.style.display = 'none';
      };
    }

    // Lyrics Toggle Logic
    const btnLyrics = document.getElementById('btn-lyrics');
    const lyricsContainer = document.getElementById('lyrics-container');
    const lyricsIcon = document.getElementById('lyrics-icon');
    const nowBar = document.getElementById('now-bar');

    if (btnLyrics) {
      btnLyrics.onclick = () => {
        const isHidden = lyricsContainer.classList.toggle('hidden');
        nowBar.classList.toggle('centered', isHidden);
        if (lyricsIcon) {
          lyricsIcon.src = isHidden ? 'icons/lyrics.png' : 'icons/lyricson.png';
        }
      };
    }

    // Favorite Button Logic
    const btnFavorite = document.getElementById('btn-favorite');
    const favoriteIcon = document.getElementById('favorite-icon');
    
    if (btnFavorite) {
      btnFavorite.onclick = () => {
        const isFavorited = btnFavorite.classList.toggle('active');
        if (favoriteIcon) {
          favoriteIcon.src = isFavorited ? 'icons/favorited.png' : 'icons/favorite.png';
        }
        // Show popup (same as AirPlay)
        if (airplayPopup) {
          airplayPopup.style.display = 'flex';
        }
      };
    }
    
    // Initialize volume slider fill
    updateVolumeSliderFill(parseFloat(volumeSlider.value));

    progressBar.onclick = (e) => {
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      player.seek(pct * player.duration);
      queueForceScroll();
    };

    lyricsContent.onclick = (e) => {
      const target = e.target;
      const lineEl = target.classList.contains('line') ? target : target.closest('.line');
      if (!lineEl) return;
      
      const lines = lyricsType === 'Syllable' ? LyricsObject.Types.Syllable.Lines : LyricsObject.Types.Line.Lines;
      for (const line of lines) {
        if (line.HTMLElement === lineEl) {
          player.seek(line.Syllables?.Lead?.[0]?.StartTime ?? line.StartTime);
          queueForceScroll();
          break;
        }
      }
    };

    function updateRomanizationBtnState(isRomanized) {
      if (isRomanized) {
        btnRomanization.classList.add('active');
        btnRomanization.querySelector('.text').textContent = 'Romanized: On';
      } else {
        btnRomanization.classList.remove('active');
        btnRomanization.querySelector('.text').textContent = 'Romanized: Off';
      }
    }

    function updateTranslationBtnState(isTranslated) {
      if (isTranslated) {
        btnTranslation.classList.add('active');
        btnTranslation.querySelector('.text').textContent = 'Translation: On';
      } else {
        btnTranslation.classList.remove('active');
        btnTranslation.querySelector('.text').textContent = 'Translation: Off';
      }
    }

    btnRomanization.onclick = () => {
      const isRomanized = !settingsManager.get("showRomanized");
      settingsManager.set("showRomanized", isRomanized);
      
      // Disable translation if romanization is on
      if (isRomanized) {
        settingsManager.set("showTranslation", false);
        updateTranslationBtnState(false);
      }

      updateRomanizationBtnState(isRomanized);
      if (parsedLyrics) applyLyricsToUI(parsedLyrics);
      queueForceScroll();
    };

    btnTranslation.onclick = () => {
      const isTranslated = !settingsManager.get("showTranslation");
      settingsManager.set("showTranslation", isTranslated);
      
      // Disable romanization if translation is on
      if (isTranslated) {
        settingsManager.set("showRomanized", false);
        updateRomanizationBtnState(false);
      }

      updateTranslationBtnState(isTranslated);
      if (parsedLyrics) applyLyricsToUI(parsedLyrics);
      queueForceScroll();
    };

    function updatePlayPauseIcon(playing) {
      playPauseIcon.src = playing ? 'icons/play.png' : 'icons/paused.png';
    }

    function startAnimationLoop() {
      function loop() {
        const pos = player.getPosition();
        setLyricsTime(pos, lyricsType);
        if (!document.hidden) {
          if (player.duration > 0) {
            progressFill.style.width = `${Math.min((pos / player.duration) * 100, 100)}%`;
            timeTotal.textContent = AudioPlayer.formatTime(player.duration - pos, true);
          }
          timeCurrent.textContent = AudioPlayer.formatTime(pos);
          animateLyrics(pos, lyricsType, false);
          scrollToActiveLine(lyricsContent);
        } else {
          animateLyrics(pos, lyricsType, true);
        }
        animationFrameId = requestAnimationFrame(loop);
      }
      animationFrameId = requestAnimationFrame(loop);
    }

    init();
    startAnimationLoop();
    btnOptions.onclick = () => settingsUI.show();

    // ── Live Settings Refresh ──
    window.addEventListener('spicy-settings-changed', () => {
      // Refresh Metadata Bar (Year position might have changed)
      if (songMetadata) updateMetadataUI(songMetadata);
      // Refresh Lyrics (Alignment, Simple Mode, Force Word Sync)
      if (parsedLyrics) applyLyricsToUI(parsedLyrics);
      // Refresh Force Scroll
      queueForceScroll();

      // Update Lyrics Provider Visibility
      const sourceBadge = document.getElementById('lyrics-source-badge');
      if (sourceBadge) {
        sourceBadge.style.display = settingsManager.get('hideLyricsProvider') ? 'none' : 'block';
      }

      // Update Dolby Atmos / Lossless
      const qualityIcon = document.getElementById('quality-badge-icon');
      const qualityText = document.getElementById('quality-badge-text');
      if (qualityIcon && qualityText) {
        if (settingsManager.get('dolbyAtmos')) {
          qualityIcon.src = 'icons/dolby_atmos.png';
          qualityText.textContent = '';
          qualityIcon.style.width = '82px';
          qualityIcon.style.height = '18px';
          qualityIcon.style.marginRight = '0px';
        } else {
          qualityIcon.src = 'icons/lossless.png';
          qualityText.textContent = 'Lossless';
          qualityIcon.style.width = '17px';
          qualityIcon.style.height = '14px';
          qualityIcon.style.marginRight = '4px';
        }
      }

      // Update AirPods / AirPlay
      const airplayIcon = document.getElementById('airplay-icon');
      if (airplayIcon) {
        if (settingsManager.get('airPodsIcon')) {
          airplayIcon.src = 'icons/earphone.png';
        } else {
          airplayIcon.src = 'icons/airplay.png';
        }
      }
    });

    // Apply settings on load
    window.dispatchEvent(new CustomEvent('spicy-settings-changed', { detail: settingsManager.settings }));

    // ── Keyboard Shortcuts ──
    document.addEventListener('keydown', (e) => {
      // Don't trigger if typing in a text field
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

      if (e.code === 'Space') {
        e.preventDefault();
        const playing = player.togglePlay();
        updatePlayPauseIcon(playing);
        if (playing && !animationFrameId) startAnimationLoop();
      }
      if (e.code === 'ArrowLeft') {
        player.seek(Math.max(0, player.getPosition() - 5000));
        queueForceScroll();
      }
      if (e.code === 'ArrowRight') {
        player.seek(Math.min(player.duration, player.getPosition() + 5000));
        queueForceScroll();
      }
    });
  </script>

  <!-- Bottom Bar -->
  <div class="BottomBar">
    <div class="bottom-bar-left">
      <button class="airplay-button" id="btn-airplay" title="AirPlay">
        <img src="icons/airplay.png" alt="AirPlay" id="airplay-icon">
      </button>
    </div>
    <div class="bottom-bar-right">
      <button class="lyrics-button" id="btn-lyrics" title="Lyrics">
        <img src="icons/lyricson.png" alt="Lyrics" id="lyrics-icon">
      </button>
      <button class="queue-button" id="btn-queue" title="Up Next">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width: 20px; height: 20px;">
          <path d="M3 17h12v-2H3v2zm0-5h12v-2H3v2zm0-5v2h12V7H3zm13 4v10l8-5-8-5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- AirPlay Popup -->
  <div class="popup-overlay" id="airplay-popup" style="display: none;">
    <div class="popup-content">
      <p>hey this button doesnt do anything, its just there for aesthetics lmao</p>
      <button class="popup-close" id="btn-close-popup">Close</button>
    </div>
  </div>
</body>
